{% extends 'base.html' %}

{% block title %}Eliminar destino{% endblock %}

{% block content %}

<section class="card">

    <h2>Confirmar eliminación</h2>

    <p>
        ¿Está seguro que desea eliminar el destino
        <strong>{{ destino.nombre_lugar }}</strong>?
    </p>

    <form method="POST" data-confirm-submit data-confirm-title="Eliminar destino" data-confirm-text="Esta acción no se puede deshacer." data-confirm-button="Sí, eliminar">

        {% csrf_token %}

        {% if puede_editar %}
            <button type="submit" class="btn-eliminar">
                Sí, eliminar
            </button>
        {% endif %}

        <a href="{% url 'listar_destinos' %}" class="btn-secundario">
            Cancelar
        </a>

    </form>

</section>

{% endblock %}
