{% extends 'base.html' %}

{% block title %}Eliminar unidad{% endblock %}

{% block content %}

<section class="card">

    <h2>Confirmar eliminación</h2>

    <p>
        ¿Está seguro que desea eliminar la unidad
        <strong>{{ unidad.nombre }}</strong>?
    </p>

    <form method="POST" data-confirm-submit data-confirm-title="Eliminar unidad" data-confirm-text="Esta acción no se puede deshacer." data-confirm-button="Sí, eliminar">

        {% csrf_token %}

        <button type="submit" class="btn-eliminar">
            Sí, eliminar
        </button>

        <a href="{% url 'listar_unidades' %}" class="btn-secundario">
            Cancelar
        </a>

    </form>

</section>

{% endblock %}
