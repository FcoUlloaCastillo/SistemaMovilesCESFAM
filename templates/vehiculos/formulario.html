{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}

<section class="card">
    <h2>{{ titulo }}</h2>

    <form method="POST" enctype="multipart/form-data" class="formulario">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn">Guardar</button>
        <a href="{% url 'listar_vehiculos' %}" class="btn-secundario">Volver</a>
    </form>
</section>

{% endblock %}
